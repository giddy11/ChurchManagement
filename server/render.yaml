services:
  - type: web
    name: your-backend-name
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_URL
        sync: false   # set this manually in Render dashboard

  - type: cron
    name: update-event-status
    env: node
    schedule: "*/5 * * * *"
    buildCommand: npm install && npm run build
    startCommand: node dist/jobs/updateEventStatus.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_URL
        sync: false   # same value as the web service
      - key: DB_SSL
        value: "true"
