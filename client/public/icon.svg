<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Church building -->
  <g fill="#ffffff">
    <!-- Cross on top -->
    <rect x="244" y="68" width="24" height="80" rx="4"/>
    <rect x="224" y="88" width="64" height="24" rx="4"/>
    <!-- Steeple / triangle roof -->
    <polygon points="256,130 186,210 326,210"/>
    <!-- Main building body -->
    <rect x="176" y="210" width="160" height="180" rx="4"/>
    <!-- Door arch -->
    <rect x="230" y="300" width="52" height="90" rx="26" ry="26" fill="#6366f1"/>
    <!-- Windows -->
    <circle cx="216" cy="260" r="16" fill="#6366f1"/>
    <circle cx="296" cy="260" r="16" fill="#6366f1"/>
    <!-- Base / steps -->
    <rect x="156" y="390" width="200" height="16" rx="4"/>
    <rect x="146" y="406" width="220" height="16" rx="4"/>
    <rect x="136" y="422" width="240" height="16" rx="4"/>
  </g>
</svg>
