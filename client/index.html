<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- PWA theme -->
  <meta name="theme-color" content="#6366f1" />

  <title>Church Management System</title>
  <meta name="description" content="Church Management System - Track attendance and manage membership" />
  <meta name="author" content="MGX" />

  <meta property="og:title" content="Church Management System" />
  <meta property="og:description" content="Church Management System - Track attendance and manage membership" />
  <meta property="og:type" content="website" />

  <!-- On custom domains the JS app will set the real title/favicon.
       Blank the title immediately so the default never flashes. -->
  <script>
    (function () {
      var h = location.hostname.toLowerCase();
      if (h !== 'localhost' && h !== '127.0.0.1' && h !== '0.0.0.0') {
        document.title = '';
      }
    })();
  </script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
