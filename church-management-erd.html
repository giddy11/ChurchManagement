<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChurchManagement — ERD</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #ffffff !important;
    color: #111111;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 32px;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; color: #111; }
  p { font-size: 13px; color: #555; margin-bottom: 28px; }
  #erd { background: #ffffff; }
  #erd svg { max-width: 100%; height: auto; background: #ffffff; }
  #erd svg text, #erd svg tspan { fill: #111111 !important; color: #111111 !important; }
</style>
</head>
<body>
<h1>ChurchManagement — Data Model ERD</h1>
<p>Entity Relationship Diagram for the PostgreSQL / TypeORM schema. PK = primary key, FK = foreign key.</p>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';

mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
  themeVariables: {
    darkMode: false,
    fontSize: '13px',
    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
    background: '#ffffff',
    primaryColor: '#e8f0fe',
    primaryTextColor: '#111111',
    primaryBorderColor: '#4a6cf7',
    lineColor: '#555555',
    textColor: '#111111',
    edgeLabelBackground: '#ffffff',
    attributeBackgroundColorOdd: '#f4f6fb',
    attributeBackgroundColorEven: '#ffffff',
  },
});

const diagram = `erDiagram

  users {
    uuid id PK
    string email UK
    string first_name
    string last_name
    string middle_name
    string nick_name
    string username
    string full_name
    string address_line
    string state
    string city
    string postal_code
    string country
    string phone_number
    date dob
    string job_title
    string employer
    string marital_status
    date date_married
    date baptism_date
    string baptism_location
    enum member_status
    enum gender
    string role
    string profile_img
    float map_pin_lat
    float map_pin_lng
    boolean is_active
    boolean is_display_email
    boolean is_accept_text
    json family_members
    json settings
    timestamp last_access
    timestamp createdAt
    timestamp updatedAt
  }

  denominations {
    uuid id PK
    string denomination_name
    string description
    string location
    string state
    string country
    string address
    uuid admin_id FK
    timestamp created_at
    timestamp updated_at
  }

  branches {
    uuid id PK
    string name
    string address
    string city
    string state
    string country
    string pastor_name
    string description
    string image
    string map_marker
    boolean is_headquarters
    uuid denomination_id FK
    timestamp created_at
    timestamp updated_at
  }

  branch_memberships {
    uuid id PK
    uuid user_id FK
    uuid branch_id FK
    enum role
    boolean is_active
    timestamp joined_at
  }

  user_denominations {
    uuid user_id FK
    uuid denomination_id FK
  }

  branch_invites {
    uuid id PK
    string code UK
    uuid branch_id FK
    uuid denomination_id FK
    uuid created_by
    timestamp expires_at
    int max_uses
    int uses_count
    boolean is_active
    timestamp created_at
    timestamp updated_at
  }

  branch_join_requests {
    uuid id PK
    uuid user_id FK
    uuid branch_id FK
    uuid denomination_id FK
    enum status
    string message
    enum joined_via
    uuid invite_id
    uuid reviewed_by
    timestamp reviewed_at
    timestamp created_at
    timestamp updated_at
  }

  branch_custom_domains {
    uuid id PK
    string domain UK
    uuid branch_id FK
    uuid denomination_id FK
    string display_name
    string logo_url
    string church_name
    string address
    string pastor_name
    string contact_email
    string contact_phone
    string tagline
    string primary_color
    boolean allow_self_signup
    enum status
    uuid reviewed_by
    timestamp reviewed_at
    timestamp created_at
    timestamp updated_at
  }

  denomination_requests {
    uuid id PK
    string denomination_name
    string first_name
    string last_name
    string email
    string phone
    string address
    string city
    string state
    string country
    text reason
    enum status
    uuid reviewed_by
    timestamp reviewed_at
    text rejection_reason
    timestamp created_at
    timestamp updated_at
  }

  events {
    uuid id PK
    string title
    string description
    string location
    enum category
    date date
    time time_from
    time time_to
    string image
    boolean is_recurring
    enum recurrence_pattern
    jsonb recurrence_days
    enum monthly_type
    int monthly_day
    date recurrence_end_date
    boolean accept_attendance
    boolean require_location
    float location_lat
    float location_lng
    int location_radius
    timestamp attendance_opens_at
    timestamp attendance_closes_at
    boolean allow_multiple_checkins
    jsonb guest_checkin_fields
    enum visibility
    boolean is_published
    enum status
    uuid branch_id FK
    uuid created_by FK
    timestamp created_at
    timestamp updated_at
  }

  event_attendance {
    uuid id PK
    uuid event_id FK
    date event_date
    uuid user_id FK
    uuid marked_by FK
    float check_in_lat
    float check_in_lng
    timestamp checked_in_at
  }

  guest_attendance {
    uuid id PK
    uuid event_id FK
    date event_date
    string first_name
    string last_name
    string email
    string phone
    string country
    string state
    string address
    text comments
    jsonb custom_responses
    float check_in_lat
    float check_in_lng
    timestamp checked_in_at
  }

  people {
    uuid id PK
    string first_name
    string last_name
    string middle_name
    string nickname
    date birthdate
    enum gender
    string address
    string state
    string city
    string country
    string email
    string phone
    string profile_image
    uuid branch_id FK
    uuid converted_user_id
    timestamp created_at
    timestamp updated_at
  }

  follow_ups {
    uuid id PK
    enum type
    enum status
    enum priority
    uuid person_id FK
    uuid user_id FK
    uuid assigned_to FK
    date scheduled_date
    timestamp completed_date
    text notes
    text outcome_notes
    uuid related_event_id
    boolean is_escalated
    uuid branch_id FK
    uuid created_by FK
    timestamp created_at
    timestamp updated_at
  }

  follow_up_contact_logs {
    uuid id PK
    uuid follow_up_id FK
    enum method
    enum outcome
    text notes
    timestamp contacted_at
    uuid contacted_by FK
    timestamp created_at
  }

  follow_up_saved_filters {
    uuid id PK
    uuid user_id
    uuid branch_id
    string name
    jsonb filters
    timestamp created_at
  }

  follow_up_notification_logs {
    uuid id PK
    uuid follow_up_id FK
    uuid user_id FK
    enum type
    enum channel
    date sent_for_date
    timestamp created_at
  }

  activity_logs {
    uuid id PK
    uuid user_id FK
    enum action
    enum entityType
    string entityId
    text description
    jsonb metadata
    timestamp createdAt
  }

  website_visits {
    uuid id PK
    string domain
    string path
    varchar page_type
    string visitor_id
    string ip_address
    text user_agent
    text referrer
    timestamp created_at
  }

  users ||--o{ denominations : "administers"
  denominations ||--o{ branches : "has branches"
  users }o--o{ denominations : "member of"
  users ||--o{ branch_memberships : "belongs to"
  branches ||--o{ branch_memberships : "has members"
  branches ||--o{ branch_invites : "has invites"
  denominations ||--o{ branch_invites : "scoped to"
  users ||--o{ branch_join_requests : "requests"
  branches ||--o{ branch_join_requests : "receives"
  denominations ||--o{ branch_join_requests : "scoped to"
  branches ||--o| branch_custom_domains : "has domain"
  denominations ||--o{ branch_custom_domains : "scoped to"
  branches ||--o{ events : "hosts"
  users ||--o{ events : "creates"
  events ||--o{ event_attendance : "has attendances"
  users ||--o{ event_attendance : "attends"
  events ||--o{ guest_attendance : "has guest check-ins"
  branches ||--o{ people : "tracks"
  branches ||--o{ follow_ups : "manages"
  people ||--o{ follow_ups : "subject of"
  users ||--o{ follow_ups : "assigned to"
  follow_ups ||--o{ follow_up_contact_logs : "has logs"
  users ||--o{ follow_up_contact_logs : "contacted by"
  follow_ups ||--o{ follow_up_notification_logs : "has notifications"
  users ||--o{ follow_up_notification_logs : "notified"
  users ||--o{ activity_logs : "generates"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

// Force all SVG text dark
document.querySelectorAll('#erd svg text, #erd svg tspan').forEach(el => {
  el.setAttribute('fill', '#111111');
  el.style.fill = '#111111';
});

// Force SVG background white
const svgEl = document.querySelector('#erd svg');
if (svgEl) {
  svgEl.style.background = '#ffffff';
  // Insert a white background rect as first child
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('width', '100%');
  bg.setAttribute('height', '100%');
  bg.setAttribute('fill', '#ffffff');
  svgEl.insertBefore(bg, svgEl.firstChild);
}

// Round entity box corners
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

// Strip borders from attribute rows
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
</body>
</html>
